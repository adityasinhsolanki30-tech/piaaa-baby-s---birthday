<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Piaaa ❤️</title>

<style>
    .photo {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    box-shadow: 0 0 20px pink;
    margin: 20px;
}

/* Smooth scroll */
html {
    scroll-behavior: smooth;
}

/* Background animation */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    animation: bgChange 6s infinite alternate;
    color: white;
    text-align: center;
}

/* Background colors */
@keyframes bgChange {
    0%   { background: #ff9a9e; }
    25%  { background: #fad0c4; }
    50%  { background: #fbc2eb; }
    75%  { background: #a18cd1; }
    100% { background: #ff9a9e; }
}

/* Container */
.container {
    padding: 40px 20px;
    max-width: 700px;
    margin: auto;
}

/* Title */
h1 {
    <img src="piaaa.jpg" alt="Piaaa" class="photo">
    font-size: 2.5rem;
}

/* Paragraph */
p {
    font-size: 1.2rem;
    line-height: 1.6;
}

/* Button */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    font-size: 1rem;
    cursor: pointer;
}

/* Sparkle animation */
@keyframes sparkleAnim {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(1.5) translateY(-100px); opacity: 0; }
}

</style>
</head>

<body>

<!-- Music -->
<audio id="bgm" loop>
    <source src="saiyaara.mp3" type="audio/mp3">
</audio>

<div class="container">

    <h1>🎉 Happy Birthday Piaaa ❤️</h1>

    <p>
        My jaanu Piaaa ❤️<br><br>
        From 4 June 2025, after RCB’s first trophy, my life changed forever.
        You became my happiness, my peace, my everything 💖<br><br>

        I love you sooo much ❤️  
        Happy Birthday my love 🎂💫
    </p>

    <button onclick="startCelebration()">Click for Surprise 🎁</button>

</div>

<script>

function startCelebration() {
    let music = document.getElementById("bgm");

    if (music) {
        music.play().catch(() => {
            alert("Tap again to play music 🎵");
        });
    }

    createSparkles();
}

function createSparkles() {
    for (let i = 0; i < 80; i++) {
        let s = document.createElement("div");

        s.style.position = "fixed";
        s.style.width = "10px";
        s.style.height = "10px";
        s.style.background = "white";
        s.style.borderRadius = "50%";
        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";
        s.style.boxShadow = "0 0 10px white";
        s.style.animation = "sparkleAnim 2s linear";

        document.body.appendChild(s);

        setTimeout(() => s.remove(), 2000);
    }
}

</script>

</body>
</html>
